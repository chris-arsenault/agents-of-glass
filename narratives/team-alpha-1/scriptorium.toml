[world]
name = "Team Alpha 1"
description = "The Wake Thread Cooperative works the bad middle of the Keel and the Shear's managed edges: dead docks, fouled courier lanes, passenger extractions, disputed packets, damaged witnesses, and claims larger outfits would rather call settled than examine twice."
tone = "Tense, practical, procedural, intimate, and source-faithful. Dramatize recovery work through custody, route pressure, witness statements, damaged cargo, stop calls, and the cost of making a true record stick."
facts = [
  "The Wake Thread is a small independent recovery cooperative operating on the Keel and the Shear's managed margins.",
  "The party begins as a newly aligned field team inside the cooperative before their first full contract together lands in full.",
  "Duva counts, Pel'vir listens, Tern calibrates, and Mox commits forward.",
  "The crew's first work sits where rescue, salvage, claims, reputation, sealed packets, route logs, and witness custody overlap.",
  "The prelude shakedown tests the crew on an honest Saltrun lane with live nursery cargo, a rattled clerk, and intake labels that do not match the actual hold.",
  "The larger Meridian Sleeve compensation file still does not name the dead correctly."
]
generation_constraints = [
  "Preserve actual-play choices, table consequences, named objects, and crew procedures rather than replacing them with generic adventure beats.",
  "Do not invent modern technology, real-world locations, or real-world institutions.",
  "Treat claims paperwork, route ledgers, witness wax, cargo custody, stop-call authority, and recovery windows as dramatic material, not background exposition.",
  "Use character-specific habits: Duva stages rooms and counts witnesses, Pel'vir names Beep/Bloop/Ratty and reads route signatures, Tern calibrates with questions and meters, and Mox names entry/feature/exit before committing."
]
dynamics = [
  "A clean story is cheap; a correct story is expensive and must be made durable under pressure.",
  "The crew wants authority before scarcity names what they can be made to accept.",
  "Route work becomes personal when old losses, family debt, probationary authority, salvage liens, and compensation files surface inside practical jobs.",
  "Institutions can turn damage into paperwork unless witnesses and workers make the injury legible."
]

