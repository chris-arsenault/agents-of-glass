[world]
name = "The Revengers"
description = "The Revengers are a small field-response compact for jobs that become dangerous before official process can catch up: rescue, breach, extraction, stabilization, and after-action truth."
tone = "Urgent, physical, mobile, and practical. Dramatize the campaign through time pressure, closing routes, dangerous rescues, improvised anchors, warning failures, moving hazards, and the cost of preserving proof while people are still in danger."
facts = [
  "The starting Revenger cell is Rin Tavik, Duva Korvanis, Sela Tarn, and Yoss Pell.",
  "The campaign's live question is whether the Revengers can get people out alive when disaster is also somebody's cover story.",
  "Reports, manifests, lockouts, and claims matter because they point to live hazards: buckled routes, jammed warnings, bad resonance, people marked dead while still breathing, witnesses being moved, tow lines cut, and hidden Coremark routes.",
  "The immediate scarcities are time, trustworthy routes, damping gear, clean forecasts, witnesses, and safe anchor points.",
  "Prelude proved the rescue loop at Ladder Throat Three and preserved the public C-12 warning proof.",
  "Cinderwake centers on paired or late warning failures, Ratter distress obligations, Bloom containment, Coremark suspicion, and routes that close before official certainty arrives."
]
generation_constraints = [
  "Use the action-adventure countdown structure: time remaining must haunt decisions, and every scene should cost time or force a bypass.",
  "Preserve actual-play choices, public proof chains, named tools, relationship handles, and table consequences.",
  "Procedure is a tool, obstacle, or clue; do not turn the story into a legal hearing or audit summary.",
  "Treat environments as active obstacles: pressure curtains, closing lanes, damping seams, dirty resonance, cinder dust, jammed warning systems, tow lines, and unsafe anchor points.",
  "Do not introduce modern technology, real-world locations, or real-world institutions."
]
dynamics = [
  "Rescue comes first, truth also: the crew must move bodies out of danger while leaving enough honest evidence that the next accident is harder to buy.",
  "Official clean forecasts and sealed reports become dangerous when they arrive later than the hazard.",
  "Coremark's power works through false-safe signatures, hidden convoy routes, late warnings, and replacement hardware that can erase the public map.",
  "The Revengers' competence is practical and embodied: Rin marks exits and anchors loads, Duva makes armed rooms hesitate and carries witnesses out, Sela reads fault bands through instruments, and Yoss flies bad approaches on purpose."
]

